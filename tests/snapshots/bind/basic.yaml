general:
  enabled: true
  port: 53530
  forwarders:
    - 8.8.8.8
    - 1.1.1.1
  dnssecvalidation: "no"
  rndcsecret: "VxtIzJevSQXqnr7h2qerrcwjnZlMWSGGFBndKeNIDfw="
  recursion:
    - local_nets

acls:
  - name: local_nets
    networks:
      - 192.168.0.0/24
      - 10.0.0.0/8

domains:
  - domainname: home.local
    type: primary
    ttl: 86400
    allowquery:
      - local_nets

records:
  - domain: home.local
    name: router
    type: A
    value: 192.168.0.1
  - domain: home.local
    name: nas
    type: A
    value: 192.168.0.10
