interfaces:
  wan:
    if: em0
    descr: WAN
    ipaddr: dhcp
    mtu: "1500"
    gateway_interface: true
    dhcphonourmtu: true
    blockpriv: true
    blockbogons: true
    mss: "1460"
    disablechecksumoffloading: true
    disablesegmentationoffloading: true
  lan:
    if: em1
    descr: LAN
    ipaddr: 192.168.1.1
    subnet: "24"
    alias-address: 192.168.1.2
    alias-subnet: "24"
    lock: true
  wifi:
    if: ath0
    descr: Wireless
    wireless:
      mode: hostap
      ssid: HomeNetwork
      channel: "6"
      authmode: wpa2psk
      wpa_mode: wpa2
      wpa_key_mgmt: WPA-PSK
      wpa_pairwise: CCMP
      passphrase: supersecretpsk
      hidessid: false
